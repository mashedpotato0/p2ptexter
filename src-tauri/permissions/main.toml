# Permission definition for the P2P application
[[permission]]
identifier = "allow-send-p2p-message"
description = "Allows sending messages via P2P"
commands.allow = ["send_p2p_message"]
[[permission]]
identifier = "allow-get-my-peer-id"
description = "Allows retrieving the local Peer ID"
commands.allow = ["get_my_peer_id"]
[[permission]]
identifier = "allow-get-nickname"
description = "Allows retrieving the local nickname"
commands.allow = ["get_nickname"]
[[permission]]
identifier = "allow-set-nickname"
description = "Allows setting the local nickname"
commands.allow = ["set_nickname"]
[[permission]]
identifier = "allow-generate-qr"
description = "Allows generating QR tokens"
commands.allow = ["generate_qr"]

[[permission]]
identifier = "allow-scan-qr"
description = "Allows scanning QR tokens"
commands.allow = ["scan_qr"]

[[permission]]
identifier = "allow-reset-identity"
description = "Allows resetting the local identity"
commands.allow = ["reset_identity"]
